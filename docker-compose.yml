services:
  db:
    image: postgres:16-alpine
    container_name: grank-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: grank
      POSTGRES_PASSWORD: grank123
      POSTGRES_DB: grank
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grank"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: grank-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://grank:grank123@db:5432/grank
      AUTH_SECRET: super-secret-key-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: super-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
